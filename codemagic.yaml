workflows:
  android-release:
    name: Android Release (AAB)
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Build release AAB
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/mapping/release/mapping.txt

  ios-release:
    name: iOS Release (IPA)
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: Codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - signing_credentials
      vars:
        APP_STORE_APP_ID: "6780416985"
        BUNDLE_ID: "com.futurastic.Delil"

    scripts:
      - name: Initialize keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "HATA: CERTIFICATE_PRIVATE_KEY eksik"; exit 1
          fi
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode | tr -d '\r' > /tmp/cert_key.pem
          if openssl pkey -in /tmp/cert_key.pem -traditional -out /tmp/cert_key_rsa.pem 2>/dev/null; then
            mv /tmp/cert_key_rsa.pem /tmp/cert_key.pem
          fi
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --platform IOS \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Flutter packages
        script: |
          flutter config --no-enable-swift-package-manager
          flutter packages pub get
      - name: Pod install
        script: find . -name "Podfile" -execdir pod install \;
      - name: Flutter build ipa
        script: |
          BUILD_NUMBER=$(date +%s)
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
